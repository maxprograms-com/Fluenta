<!Doctype html>
<html lang="en">

<head>
    <title>Software Updates</title>
    <link id="theme" rel="stylesheet" type="text/css" href="../../css/light.css">
</head>

<body class="dialogBody">

    <div class="row">
        <img src="../../img/icon.png" width="120" style="padding: 12px;" />
        <div>
            <p class="center">An updated version of Fluenta is available</p>
            <table>
                <tr>
                    <td class="noWrap">Installed Version:</td>
                    <td id="current" class="fill_width paddedLeft">5.0.0</td>
                </tr>
                <tr>
                    <td class="noWrap">Latest version:</td>
                    <td id="latest" class="fill_width paddedLeft">5.0.0</td>
                </tr>
            </table>
        </div>
    </div>

    <div class="buttonArea">
        <button id="release">View Release History</button>
        <button id="download">Download Update</button>
    </div>
    
    <script>
        const { Updates } = require('../../js/updates.js');
        new Updates();
    </script>
</body>

</html>
